<!DOCTYPE html>
<html><head><title>Interaction Tests</title></head>
<body>
  <h1>Interaction Test Page</h1>

  <button id="dbl-btn" ondblclick="this.textContent='double-clicked'">Double Click Me</button>

  <input type="checkbox" id="cb1" />
  <label for="cb1">Checkbox</label>

  <input type="text" id="focus-input" placeholder="Focus me" />

  <input type="text" id="value-input" value="prefilled" />

  <div id="drag-src" draggable="true" style="width:50px;height:50px;background:red;">Drag</div>
  <div id="drag-tgt" style="width:100px;height:100px;background:blue;">Drop Here</div>

  <div class="item">Item 1</div>
  <div class="item">Item 2</div>
  <div class="item">Item 3</div>

  <div id="highlight-target">Highlight me</div>

  <div style="height:3000px;">Spacer for scroll testing</div>
  <div id="bottom-marker">Bottom</div>

  <button id="ctx-btn" oncontextmenu="this.textContent='right-clicked'; event.preventDefault()">Right Click Me</button>

  <img id="alt-img" alt="Test Logo" src="" />
  <span id="title-span" title="Close Dialog">X</span>

  <div id="mouse-tracker" onmousemove="this.dataset.x=event.clientX; this.dataset.y=event.clientY">Track</div>

  <div id="error-trigger" onclick="console.error('test error')">Trigger Error</div>

  <input type="text" id="inserttext-target" value="" placeholder="Insert text here" />

  <div id="tap-target" ontouchstart="this.textContent='tapped'" style="width:100px;height:100px;background:#eee;">Tap Me</div>

  <div id="scroll-anchor" style="margin-top:50px;">Scroll Anchor</div>
</body>
</html>
