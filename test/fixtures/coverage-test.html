<html>
<head>
  <style>
    .used { color: red; }
    .unused-class { background: blue; }
    .also-unused { margin: 10px; }
  </style>
</head>
<body>
  <p class="used">This paragraph uses the .used class</p>
  <script>
    function usedFunction() { return 'hello'; }

    usedFunction();
  </script>

</html>
