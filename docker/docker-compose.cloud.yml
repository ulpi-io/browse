# docker-compose.cloud.yml — Local development / testing setup
# for the cloud gateway + isolated session containers.
#
# Usage (from repo root):
#   docker compose -f docker/docker-compose.cloud.yml up --build
#
# Usage (session container only):
#   docker compose -f docker/docker-compose.cloud.yml up session --build
#
# The session service runs a single browse server in an isolated
# container. In production, the gateway provisions these dynamically
# via the Docker Engine API (Phase 9 orchestrator).
#
# The gateway service requires a separate Dockerfile that bundles
# src/cloud/server.ts — it will be added in a later task.

services:
  # ── Cloud Gateway (placeholder) ─────────────────────────────
  # The cloud server (src/cloud/server.ts) is a separate entry
  # point not included in dist/browse.cjs. This service will need
  # its own Dockerfile.cloud once the cloud server is bundled.
  # For now, use `npm run cloud` on the host for gateway dev.
  #
  # gateway:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile.cloud
  #   container_name: browse-gateway
  #   environment:
  #     BROWSE_CLOUD_PORT: "8400"
  #     BROWSE_CLOUD_HOST: "0.0.0.0"
  #     BROWSE_CLOUD_ADMIN_KEY: "${BROWSE_CLOUD_ADMIN_KEY:-dev-admin-key}"
  #     BROWSE_LOCAL_DIR: "/tmp"
  #     NODE_ENV: "production"
  #   ports:
  #     - "8400:8400"
  #   networks:
  #     - browse-internal
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "node", "-e", "fetch('http://localhost:8400/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
  #     interval: 10s
  #     timeout: 3s
  #     start_period: 15s
  #     retries: 3
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M
  #         cpus: "0.5"

  # ── Session Container ───────────────────────────────────────
  # A single browse server running in its own container.
  # Each container = one Chromium instance = one session.
  # In production, the gateway's ContainerOrchestrator provisions
  # these dynamically. This service exists for local testing.
  session:
    build:
      context: ..
      dockerfile: docker/Dockerfile.session
    container_name: browse-session-dev
    environment:
      __BROWSE_SERVER_MODE: "1"
      BROWSE_PORT: "9400"
      BROWSE_IDLE_TIMEOUT: "300000"
      BROWSE_LOCAL_DIR: "/tmp"
      NODE_ENV: "production"
    ports:
      - "9400:9400"
    networks:
      - browse-internal
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

networks:
  browse-internal:
    driver: bridge
